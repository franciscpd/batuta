name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # PR de release é gerado mecanicamente a partir de commits já na main:
      # merge imediato via bypass de admin, sem exigir aprovação
      - name: Auto-merge release PR
        if: ${{ steps.release.outputs.pr }}
        run: gh pr merge --squash --admin --repo "${{ github.repository }}" "${{ fromJson(steps.release.outputs.pr).number }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
